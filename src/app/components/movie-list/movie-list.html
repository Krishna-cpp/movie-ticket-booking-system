<div class="container">

<h2>Now Showing</h2>

<div class="search-bar">
<input
type="text"
placeholder="Search movies..."
[(ngModel)]="searchText"
(input)="searchMovies()"
/>
</div>

<div class="movie-grid">

<div class="movie-card" *ngFor="let movie of filteredMovies">

<img [src]="movie.poster" alt="{{movie.title}}">

<h3>{{movie.title}}</h3>

<p>{{movie.genre}}</p>

<p>⭐ {{movie.rating}}</p>

<button [routerLink]="['/movies',movie.id]">
View Details
</button>

</div>

</div>

</div>
